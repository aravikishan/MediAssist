version: "3.8"

services:
  mediassist:
    build: .
    ports:
      - "8011:8011"
    environment:
      - MEDIASSIST_PORT=8011
      - MEDIASSIST_DEBUG=false
    volumes:
      - mediassist-data:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mediassist-data:
